    <h2 class="text-2xl font-bold text-emerald-900">
      Historial de los movimientos en los fondos de inversión
    </h2>

  @if(dataHistorialFunds().length > 0) {
    <app-tables [columns]="columns()" [rows]="dataHistorialFunds()">

  } @else {

      No hay historial de fondos de inversión.
    </p>
  }
</div>
