<button class="mt-5 text-base font-bold h-full border-2 min-w-min max-w-none leading-5 items-center justify-center flex-wrap focus-visible:outline-none py-2 px-8 tracking-wide cursor-pointer border-green-800 hover:bg-green-600 text-green-900 hover:text-white rounded-3xl"
  (click)="onClick()" [disabled]="disabled()">
  @if (icon()) {
    <mat-icon >{{icon()}}</mat-icon>
  }
  @if (name()) {
    <span class="ml-2">{{name()}}</span>
  }
</button>
