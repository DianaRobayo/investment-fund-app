<div class="mat-elevation-z8 overflow-visible">
  <table mat-table [dataSource]="dataSource"
    class="">
    @for (column of columns(); track column.field) {
      <ng-container [matColumnDef]="column.field">
        <th mat-header-cell *matHeaderCellDef> {{column.title | titlecase }} </th>
        @if (column.icon) {
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button type="button"
              class="text-white font-bold py-2 px-4 rounded"
              [ngClass]="{
                'bg-blue-500 hover:bg-blue-700': column.colorButton === 'blue',
                'bg-red-500 hover:bg-red-700': column.colorButton === 'red',
                'bg-green-500 hover:bg-green-700': column.colorButton === 'green'
              }"
              (click)="actionButton(element, column.field)">
              <mat-icon >
                {{ column.icon }}
              </mat-icon>
            </button>
          </td>
        } @else {
          <td mat-cell *matCellDef="let element">
            {{element[column.field]}}
          </td>
        }
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns();"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons
    aria-label="Seleccionar página">
  </mat-paginator>
</div>
